version: "3.9"

services:
  # ─── MongoDB ───────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: insightflow_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: insightflow
    networks:
      - insightflow_net

  # ─── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: insightflow_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - insightflow_net

  # ─── ChromaDB ──────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: insightflow_chroma
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - insightflow_net

  # ─── Backend (FastAPI) ─────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./storage:/app/storage
      - chroma_data:/app/chroma_data
    depends_on:
      - mongodb
      - redis
      - chromadb
    networks:
      - insightflow_net

  # ─── Frontend (React + Vite) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insightflow_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - insightflow_net

  # ─── Nginx Reverse Proxy ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: insightflow_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - insightflow_net

volumes:
  mongo_data:
  redis_data:
  chroma_data:

networks:
  insightflow_net:
    driver: bridge
